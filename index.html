<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园2K · 梦幻抽卡</title>
<style>
/* ============================================
   ROOT TOKENS — 未来竞技场 · 霓虹紫金主题
   ============================================ */
:root {
  --bg-deep: #090B1F;
  --bg-mid: #101034;
  --bg-surface: #15133A;
  --bg-card: #1A1645;
  --border-subtle: rgba(255,255,255,0.06);
  --border-dim: rgba(255,255,255,0.1);

  --purple-neon: #7B3CFF;
  --purple-light: #9B5CFF;
  --purple-pink: #C35CFF;
  --gold: #F4C76B;
  --gold-light: #FFD77A;
  --gold-dark: #B98235;
  --ice: #4FD8FF;
  --ice-soft: #6AAEFF;

  --text-primary: #F5F2FF;
  --text-secondary: #A9A0C8;
  --text-muted: #6B6585;

  --ssr-color: #F4C76B;
  --ssr-glow: 0 0 24px rgba(244,199,107,0.6), 0 0 48px rgba(244,199,107,0.25);
  --sr-color: #9B5CFF;
  --sr-glow: 0 0 20px rgba(155,92,255,0.55), 0 0 40px rgba(155,92,255,0.2);
  --s-color: #FF9100;
  --s-glow: 0 0 16px rgba(255,145,0,0.45);
  --a-color: #4FD8FF;
  --a-glow: 0 0 14px rgba(79,216,255,0.4);
  --b-color: #4dff88;
  --b-glow: 0 0 10px rgba(77,255,136,0.3);
  --c-color: #9E9E9E;
  --c-glow: 0 0 6px rgba(158,158,158,0.8);

  --side-w: 200px;
  --top-h: 56px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ============================================
   BASE
   ============================================ */
body {
  font-family: 'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  background: var(--bg-deep) url('bg.jpg') no-repeat center top;
  background-size: cover;
  background-attachment: fixed;
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
}

/* ============================================
   BACKGROUND CANVAS (particles / light fog)
   ============================================ */
#bgCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ============================================
   COURT LINES & DECORATIVE OVERLAY
   ============================================ */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    /* center stage glow */
    radial-gradient(ellipse 60% 55% at 50% 45%, rgba(123,60,255,0.07) 0%, transparent 60%),
    /* top gold accent */
    radial-gradient(ellipse 40% 30% at 50% 5%, rgba(244,199,107,0.05) 0%, transparent 60%),
    /* basketball court subtle lines */
    radial-gradient(circle at 50% 42%, transparent 140px, rgba(255,255,255,0.015) 140px, rgba(255,255,255,0.015) 142px, transparent 142px),
    /* three point arc hint */
    radial-gradient(ellipse 50% 45% at 50% 82%, transparent 65%, rgba(255,255,255,0.01) 65%, rgba(255,255,255,0.01) 66%, transparent 66%),
    /* floor reflection */
    linear-gradient(180deg, transparent 55%, rgba(123,60,255,0.03) 70%, rgba(9,11,31,0.6) 95%);
}

/* ============================================
   SIDEBAR (PC)
   ============================================ */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; z-index: 50;
  width: var(--side-w);
  background: rgba(16,16,52,0.85);
  backdrop-filter: blur(16px);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  padding: 20px 14px;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 28px; border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 20px;
}
.sidebar-logo .slo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--purple-neon), var(--purple-pink));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 16px rgba(123,60,255,0.4);
}
.sidebar-logo .slo-text {
  font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, var(--purple-light), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-nav { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.sidebar-nav li {
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  font-size: 13px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 8px;
  transition: all 0.2s;
}
.sidebar-nav li:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
.sidebar-nav li.active {
  background: linear-gradient(135deg, rgba(123,60,255,0.2), rgba(155,92,255,0.1));
  color: var(--gold-light);
  border: 1px solid rgba(244,199,107,0.15);
  box-shadow: 0 0 12px rgba(123,60,255,0.15);
}
.sidebar-nav li .nav-icon { font-size: 16px; width: 20px; text-align: center; }

/* ============================================
   MAIN CONTENT AREA
   ============================================ */
.main-content {
  margin-left: var(--side-w);
  flex: 1; min-height: 100vh;
  display: flex; flex-direction: column;
  position: relative; z-index: 1;
}

/* ============================================
   TOP BAR
   ============================================ */
.topbar {
  position: sticky; top: 0; z-index: 40;
  height: var(--top-h);
  background: rgba(13,13,30,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
}
.topbar .user-info {
  display: flex; align-items: center; gap: 10px;
}
.topbar .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple-neon), var(--purple-pink));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.topbar .nickname { font-size: 13px; font-weight: 600; }
.topbar .lvl {
  font-size: 10px; padding: 2px 6px; border-radius: 8px;
  background: rgba(123,60,255,0.25); color: var(--purple-light);
}
.topbar .resources {
  display: flex; gap: 18px; align-items: center;
}
.topbar .res-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
}
.topbar .res-icon {
  width: 18px; height: 18px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.res-icon.gold-bg { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); }
.res-icon.purple-bg { background: linear-gradient(135deg, var(--purple-neon), var(--purple-light)); }
.res-icon.ice-bg { background: linear-gradient(135deg, #3a8fd4, var(--ice)); }
.topbar .res-plus {
  width: 16px; height: 16px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: none;
  color: var(--text-secondary); font-size: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.topbar .res-plus:hover { background: rgba(255,255,255,0.16); }

/* ============================================
   PAGE CONTENT
   ============================================ */
.page-content {
  flex: 1; padding: 24px;
  display: flex; flex-direction: column;
  max-width: 1100px; margin: 0 auto; width: 100%;
}

/* ============================================
   STAGE — 抽卡核心区
   ============================================ */
.stage {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  padding: 30px 20px 20px;
  margin-bottom: 20px;
}
.stage::before {
  content: ''; position: absolute; inset: 0; z-index: -1; pointer-events: none;
  /* energy rings */
  background:
    radial-gradient(circle at 50% 40%, transparent 150px, rgba(123,60,255,0.04) 150px, rgba(123,60,255,0.04) 152px, transparent 152px),
    radial-gradient(circle at 50% 40%, transparent 180px, rgba(79,216,255,0.02) 180px, rgba(79,216,255,0.02) 182px, transparent 182px),
    radial-gradient(circle at 50% 40%, transparent 210px, rgba(123,60,255,0.02) 210px, rgba(123,60,255,0.02) 212px, transparent 212px);
}

/* Section Title */
.section-title {
  font-size: 22px; font-weight: 800; letter-spacing: 2px;
  background: linear-gradient(180deg, var(--text-primary) 40%, var(--purple-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.section-sub {
  font-size: 13px; color: var(--text-secondary); margin-bottom: 24px;
}

/* ============================================
   CARD PACK DISPLAY — 发光平台上的卡包
   ============================================ */
.pack-platform {
  position: relative; width: 200px; height: 200px;
  margin-bottom: 28px;
  display: flex; align-items: center; justify-content: center;
}
/* Glowing platform rings */
.pack-platform::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 180px; height: 180px; transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle, rgba(123,60,255,0.15) 0%, transparent 60%),
    conic-gradient(from 0deg, transparent, rgba(123,60,255,0.08), transparent, rgba(79,216,255,0.06), transparent);
  animation: platformSpin 8s linear infinite;
}
.pack-platform::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 140px; height: 140px; transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 1px solid rgba(244,199,107,0.12);
  box-shadow: 0 0 30px rgba(123,60,255,0.1), inset 0 0 30px rgba(123,60,255,0.05);
}
@keyframes platformSpin { to { transform: translate(-50%, -50%) rotate(360deg); } }

.pack-box {
  position: relative; z-index: 2;
  width: 110px; height: 140px;
  background: linear-gradient(180deg, #1e2d50, #151e38);
  border: 1.5px solid rgba(244,199,107,0.2);
  border-radius: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.pack-box:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(123,60,255,0.25), 0 0 40px rgba(123,60,255,0.1);
  border-color: rgba(244,199,107,0.4);
}
.pack-box::before {
  content: '';
  position: absolute; inset: -3px; border-radius: 15px; z-index: -1;
  background: linear-gradient(135deg, rgba(244,199,107,0.2), transparent 40%, transparent 60%, rgba(123,60,255,0.2));
}
.pack-icon { font-size: 48px; filter: drop-shadow(0 4px 12px rgba(244,199,107,0.3)); animation: packFloat 3s ease-in-out infinite; }
@keyframes packFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* ============================================
   BUTTONS
   ============================================ */
.btn-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
.btn {
  padding: 14px 34px; border-radius: 10px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all 0.25s; font-family: inherit;
  position: relative; overflow: hidden;
  letter-spacing: 1px;
}
.btn:active { transform: scale(0.96); }

/* Primary — Gold angled button */
.btn-primary {
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
  color: #1a1030;
  font-size: 16px; font-weight: 800;
  box-shadow: 0 4px 24px rgba(244,199,107,0.35);
  clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  padding: 15px 40px;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(244,199,107,0.5), 0 0 50px rgba(244,199,107,0.2);
}
.btn-primary::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
  pointer-events: none;
}

/* Secondary — Purple translucent */
.btn-secondary {
  background: rgba(123,60,255,0.12);
  color: var(--text-primary);
  border: 1px solid rgba(155,92,255,0.25);
}
.btn-secondary:hover {
  background: rgba(123,60,255,0.2);
  border-color: rgba(155,92,255,0.45);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(123,60,255,0.2);
}

/* Gold outline */
.btn-gold-outline {
  background: rgba(244,199,107,0.06);
  color: var(--gold-light);
  border: 1px solid rgba(244,199,107,0.25);
}
.btn-gold-outline:hover {
  background: rgba(244,199,107,0.14);
  border-color: rgba(244,199,107,0.5);
  box-shadow: 0 4px 20px rgba(244,199,107,0.15);
  transform: translateY(-2px);
}

/* Small icon button */
.btn-sm {
  padding: 8px 16px; font-size: 12px; border-radius: 8px;
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  border: 1px solid rgba(255,255,255,0.08);
}
.btn-sm:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

/* ============================================
   DRAW AREA (翻牌台)
   ============================================ */
.draw-area {
  display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
  padding: 24px 20px; min-height: 160px;
  background: rgba(16,16,52,0.4);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(255,255,255,0.05);
  position: relative;
  backdrop-filter: blur(4px);
}
.draw-area::before {
  content: '抽卡台'; position: absolute; top: -26px; left: 16px;
  font-size: 11px; color: var(--text-muted); letter-spacing: 2px;
}
.draw-empty {
  color: var(--text-muted); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  min-height: 140px;
}

/* ============================================
   FLIP CARD
   ============================================ */
.flip-card {
  width: 160px; height: 240px; perspective: 800px; cursor: pointer;
  transition: transform 0.3s;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.flip-card:hover { transform: translateY(-6px); }
.flip-card.flipped .card-inner { transform: rotateY(180deg); }

/* Rarity pulse on flip */
.flip-card.ssr-flip { animation: ssrPulse 0.7s ease-out; }
.flip-card.sr-flip { animation: srPulse 0.6s ease-out; }
@keyframes ssrPulse {
  0% { filter: drop-shadow(0 0 0 gold); }
  50% { filter: drop-shadow(0 0 24px gold) drop-shadow(0 0 40px rgba(244,199,107,0.6)); }
  100% { filter: drop-shadow(0 0 6px gold); }
}
@keyframes srPulse {
  0% { filter: drop-shadow(0 0 0 #9B5CFF); }
  50% { filter: drop-shadow(0 0 18px #9B5CFF) drop-shadow(0 0 30px rgba(155,92,255,0.5)); }
  100% { filter: drop-shadow(0 0 4px #9B5CFF); }
}

.card-inner {
  width: 100%; height: 100%; position: relative;
  transition: transform 0.7s cubic-bezier(0.23,1,0.32,1);
  transform-style: preserve-3d;
}
.card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 10px; overflow: hidden; }

/* Card Back — unified dark tech design */
.card-back {
  background: linear-gradient(160deg, #121040, #1a1660, #121040);
  border: 1.5px solid rgba(155,92,255,0.15);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px;
}
.card-back-pattern {
  position: absolute; inset: 0; opacity: 0.05;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(255,255,255,0.5) 6px, rgba(255,255,255,0.5) 7px),
    linear-gradient(180deg, rgba(123,60,255,0.1) 0%, transparent 50%, rgba(123,60,255,0.1) 100%);
}
.card-back-icon { font-size: 36px; position: relative; z-index: 1; filter: drop-shadow(0 0 8px rgba(123,60,255,0.4)); }
.card-back-label {
  font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.35);
  letter-spacing: 2px; position: relative; z-index: 1;
}

/* Card Front */
.card-front {
  transform: rotateY(180deg);
  display: flex; flex-direction: column;
  background: var(--bg-card);
  border: 1.5px solid rgba(255,255,255,0.08);
}

/* Rarity borders */
.card-front.ssr {
  border-color: var(--ssr-color);
  box-shadow: var(--ssr-glow), inset 0 0 40px rgba(244,199,107,0.04);
  background: linear-gradient(180deg, #1a1230, #1a1535);
}
.card-front.sr {
  border-color: var(--sr-color);
  box-shadow: var(--sr-glow), inset 0 0 35px rgba(155,92,255,0.03);
}
.card-front.s {
  border-color: var(--s-color);
  box-shadow: var(--s-glow), inset 0 0 30px rgba(255,145,0,0.03);
}
.card-front.a {
  border-color: var(--a-color);
  box-shadow: var(--a-glow);
}
.card-front.b {
  border-color: var(--b-color);
  box-shadow: var(--b-glow);
}
.card-front.c {
  border-color: var(--c-color);
  box-shadow: var(--c-glow);
}

/* Card front — content */
.cf-header { padding: 7px 8px 3px; text-align: center; }
.cf-rarity-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
}
.ssr .cf-rarity-badge { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #1a1030; }
.sr .cf-rarity-badge { background: linear-gradient(135deg, var(--purple-neon), var(--purple-light)); color: #fff; }
.s .cf-rarity-badge { background: var(--s-color); color: #fff; }
.a .cf-rarity-badge { background: var(--a-color); color: #0a2030; }
.b .cf-rarity-badge { background: var(--b-color); color: #003315; }
.c .cf-rarity-badge { background: var(--c-color); color: #fff; }

.cf-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4px; min-height: 0; }
.cf-body img { max-width: 100%; max-height: 145px; object-fit: contain; border-radius: 4px; }

.cf-footer { padding: 6px 8px 8px; text-align: center; }
.cf-name { font-size: 13px; font-weight: 800; letter-spacing: 0.5px; }
.cf-pos { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-top: 2px; }
.card-click-hint {
  position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
  font-size: 8px; color: rgba(255,255,255,0.3);
  pointer-events: none; z-index: 10;
  animation: hintFade 2s ease-in-out infinite;
}
@keyframes hintFade { 0%,100%{opacity:0.2} 50%{opacity:1} }

/* ============================================
   SSR BURST OVERLAY
   ============================================ */
.burst-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 300;
  display: flex; align-items: center; justify-content: center;
  animation: burstFade 1.4s ease-out forwards;
}
@keyframes burstFade { 0%{opacity:1} 100%{opacity:0;transform:scale(1.6)} }
.burst-text {
  font-size: 52px; font-weight: 900; letter-spacing: 3px;
  background: linear-gradient(135deg, var(--gold), #fff8dc, var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 50px rgba(244,199,107,0.8);
  animation: burstText 1.4s ease-out forwards;
}
@keyframes burstText { 0%{transform:scale(0.2);opacity:0} 25%{transform:scale(1.3);opacity:1} 100%{transform:scale(1);opacity:0} }

/* ============================================
   RADAR MODAL
   ============================================ */
.radar-modal {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(5,5,16,0.94);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.radar-modal.active { opacity: 1; pointer-events: auto; }
.radar-modal-content {
  position: relative; max-width: 90vw; max-height: 90vh;
  background: var(--bg-surface);
  border-radius: var(--radius-lg); padding: 28px; text-align: center;
  border: 1px solid rgba(244,199,107,0.15);
  box-shadow: 0 0 60px rgba(123,60,255,0.15);
}
.radar-modal-content img { max-width: 100%; max-height: 68vh; border-radius: 8px; transition: opacity 0.25s; }
.radar-modal-img-wrap { position: relative; display: inline-block; }
.radar-modal-close {
  position: absolute; top: 10px; right: 14px;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-primary); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.radar-modal-close:hover { background: rgba(255,255,255,0.14); }
.radar-modal-name { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
.radar-modal-rarity { margin-bottom: 14px; }

/* ============================================
   COLLECTION / 图鉴
   ============================================ */
.collection-section {
  margin-top: 10px; padding: 20px 0 40px;
}
.collection-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.collection-header h3 { font-size: 17px; font-weight: 700; letter-spacing: 1px; }
.collection-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
}
.collection-card {
  background: var(--bg-card);
  border-radius: 10px; padding: 8px 6px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.04);
  transition: transform 0.2s, border-color 0.2s;
  position: relative; overflow: hidden;
}
.collection-card:hover { transform: translateY(-2px); }
.collection-card.locked { opacity: 0.28; filter: grayscale(1); }
.collection-card .cc-placeholder {
  width: 56px; height: 56px; margin: 4px auto;
  border-radius: 4px; background: rgba(255,255,255,0.03);

/* ============ LOADING SCREEN ============ */
.loading-screen {

}
.loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

/* Court area */
.load-court {
  position: relative; width: 200px; height: 120px; margin-bottom: 20px;
  background: linear-gradient(180deg, rgba(139,90,43,0.3), rgba(180,120,60,0.2));

  border: 1px solid rgba(255,255,255,0.06);
}
.load-court-line {

.load-ball {

}
.load-ball-shadow {
  position: absolute; top: 75px; left: 92px;

}
.load-player {
  position: absolute; top: 8px; right: 30px;
  font-size: 44px; filter: drop-shadow(0 0 8px rgba(123,60,255,0.5));

.load-player-left {
  position: absolute; top: 8px; left: 25px;

}

@keyframes ballDribble {
  0%, 100% { transform: translateY(0) scale(1,1); }
  15% { transform: translateY(25px) scale(0.9,1.1); }
  30% { transform: translateY(2px) scale(1.1,0.9); }
  50% { transform: translateY(25px) scale(0.9,1.1); }
  65% { transform: translateY(2px) scale(1.1,0.9); }
  85% { transform: translateY(18px) scale(0.95,1.05); }
}
@keyframes shadowPulse {
  0%, 100% { transform: scaleX(1); opacity: 0.3; }
  50% { transform: scaleX(0.5); opacity: 0.1; }
}
@keyframes playerDance {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-8px) rotate(-5deg); }

.load-title {

/* ============================================

<script>
// ==================== PLAYER DB ====================
const PLAYERS = [
  {name:'梁学明',rarity:'SSR',ovr:126,pos:'SF/PF',style:'全能型球员',img:'球员界面图/梁学明.jpg'},
  {name:'周杰龙',rarity:'SR',ovr:122,pos:'SG/SF',style:'进攻万花筒',img:'球员界面图/周杰龙.jpg'},
  {name:'吴宇轩',rarity:'SR',ovr:120,pos:'SF',style:'进攻万花筒',img:'球员界面图/吴宇轩.jpg'},
  {name:'蒋子豪',rarity:'S',ovr:115,pos:'SG/C',style:'锁防精英',img:'球员界面图/蒋子豪.jpg'},
  {name:'吴润琪',rarity:'S',ovr:114,pos:'SG/SF',style:'攻防双向球员',img:'球员界面图/吴润琪.jpg'},
  {name:'张爽',rarity:'S',ovr:113,pos:'C/PF',style:'篮板精英',img:'球员界面图/张爽.jpg'},
  {name:'章世贸',rarity:'A',ovr:112,pos:'PG/SG',style:'进攻万花筒',img:'球员界面图/章世贸.jpg'},
  {name:'朱卓人',rarity:'A',ovr:109,pos:'SG/SF',style:'中距离终结者',img:'球员界面图/朱卓人.jpg'},
  {name:'冯丁禹',rarity:'A',ovr:108,pos:'SG/C',style:'锁防精英',img:'球员界面图/冯丁禹.jpg'},
  {name:'徐文景',rarity:'B',ovr:108,pos:'PF/C',style:'背身得分手',img:'球员界面图/徐文景.jpg'},
  {name:'孙屹栋',rarity:'B',ovr:104,pos:'SF/PF',style:'外线封锁者',img:'球员界面图/孙屹栋.jpg'},
  {name:'姜钧',rarity:'B',ovr:102,pos:'PG/SG',style:'外线封锁者',img:'球员界面图/姜钧.jpg'},
  {name:'刘郑伟',rarity:'C',ovr:99,pos:'PF/C',style:'接球投篮手',img:'球员界面图/刘郑伟.jpg'},
  {name:'萧礼强',rarity:'C',ovr:97,pos:'PG/SG',style:'接球投篮手',img:'球员界面图/萧礼强.jpg'},
  {name:'陈艺文',rarity:'C',ovr:96,pos:'PG/SG',style:'潜力待发掘',img:'球员界面图/陈艺文.jpg'}
];

const RARITY_WEIGHTS = {SSR:1,SR:2,S:5,A:10,B:20,C:37};
const TOTAL_WEIGHT = Object.values(RARITY_WEIGHTS).reduce((a,b)=>a+b,0);
const PLAYERS_BY_RARITY = {};
PLAYERS.forEach(p=>{
  if(!PLAYERS_BY_RARITY[p.rarity])PLAYERS_BY_RARITY[p.rarity]=[];
  PLAYERS_BY_RARITY[p.rarity].push(p);
});
const RARITY_COLORS = {
  SSR:{hex:'#F4C76B',bg:'linear-gradient(135deg,#1a1230,#1a1535)'},
  SR:{hex:'#9B5CFF',bg:'linear-gradient(135deg,#121030,#181440)'},
  S:{hex:'#FF9100',bg:'linear-gradient(135deg,#1a1010,#1a1515)'},
  A:{hex:'#4FD8FF',bg:'linear-gradient(135deg,#0a1820,#0a1e28)'},
  B:{hex:'#4dff88',bg:'linear-gradient(135deg,#081a10,#0a1e15)'},
  C:{hex:'#9E9E9E',bg:'linear-gradient(135deg,#151515,#1a1a1a)'}
};

// ==================== BACKGROUND CANVAS ====================
(function initBg(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let w,h,particles=[];

  function resize(){
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',()=>{resize();initParticles();});

  function initParticles(){
    particles=[];
    const count=Math.floor(w*h/12000);
    for(let i=0;i<count;i++){
      particles.push({
        x:Math.random()*w, y:Math.random()*h,
        r:0.4+Math.random()*1.8,
        vx:(Math.random()-0.5)*0.3, vy:-0.2-Math.random()*0.5,
        alpha:0.15+Math.random()*0.4,
        hue:Math.random()<0.3?260+Math.random()*30:40+Math.random()*20
      });
    }
  }
  initParticles();

  function draw(){
    ctx.clearRect(0,0,w,h);
    for(const p of particles){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=w; if(p.x>w)p.x=0;
      if(p.y<-10){p.y=h+10;p.x=Math.random()*w;}
      if(p.y>h+10){p.y=-10;p.x=Math.random()*w;}
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},60%,70%,${p.alpha})`;
      ctx.fill();
      // Glow on some
      if(p.r>1.2){
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
        ctx.fillStyle=`hsla(${p.hue},60%,70%,${p.alpha*0.2})`;
        ctx.fill();
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ==================== SOUND ENGINE ====================
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(f,d,t,v,n){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=t||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(v||0.07,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
  o.connect(g);
  if(n){g.connect(n);n.connect(audioCtx.destination);}
  else{g.connect(audioCtx.destination);}
  o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+d);
}
function sfxFlip(){playTone(800,0.07,'square',0.035);setTimeout(()=>playTone(1100,0.05,'square',0.025),40);}
function sfxRare(){playTone(523,0.15,'sine',0.06);setTimeout(()=>playTone(659,0.15,'sine',0.06),120);setTimeout(()=>playTone(784,0.3,'sine',0.06),240);}
function sfxSSR(){playTone(523,0.2,'triangle',0.08);setTimeout(()=>playTone(659,0.2,'triangle',0.08),150);setTimeout(()=>playTone(784,0.2,'triangle',0.08),300);setTimeout(()=>playTone(1047,0.5,'triangle',0.1),450);}
function sfxClick(){playTone(600,0.04,'square',0.02);}

// ==================== STATE ====================
let totalDraws=0,collection={},isDrawing=false;

// ==================== DOM ====================
const $drawArea=document.getElementById('drawArea');
const $btnSingle=document.getElementById('btnSingle');
const $btnFive=document.getElementById('btnFive');
const $collectionCount=document.getElementById('collectionCount');
const $collectionGrid=document.getElementById('collectionGrid');
const $toast=document.getElementById('toast');
const $radarModal=document.getElementById('radarModal');
const $radarName=document.getElementById('radarName');
const $radarRarity=document.getElementById('radarRarity');
const $radarImg=document.getElementById('radarImg');
const $radarModalClose=document.getElementById('radarModalClose');

// ==================== DRAW LOGIC ====================
function rollPlayer(){
  let roll=Math.random()*TOTAL_WEIGHT;
  let chosen='C';
  for(const r of['SSR','SR','S','A','B','C']){
    roll-=RARITY_WEIGHTS[r];
    if(roll<=0){chosen=r;break;}
  }
  const pool=PLAYERS_BY_RARITY[chosen];
  return pool[Math.floor(Math.random()*pool.length)];
}
function rollPlayers(n){const r=[];for(let i=0;i<n;i++)r.push(rollPlayer());return r;}

// ==================== TOAST ====================
let toastTimer;
function showToast(msg,rarity){
  clearTimeout(toastTimer);
  $toast.textContent=msg;
  $toast.className='toast '+rarity.toLowerCase()+' show';
  toastTimer=setTimeout(()=>{$toast.classList.remove('show');},2200);
}

// ==================== SSR BURST ====================
function showBurst(){
  const el=document.createElement('div');
  el.className='burst-overlay';
  el.innerHTML='<div class="burst-text">&#11088; SUPER RARE &#11088;</div>';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

// ==================== CARD PREVIEW MODAL ====================
function openRadar(player){
  $radarName.textContent=player.name+' · '+player.ovr;
  $radarRarity.innerHTML='<span style="display:inline-block;padding:3px 12px;border-radius:12px;font-size:13px;font-weight:700;background:'+RARITY_COLORS[player.rarity].hex+';color:'+(player.rarity==='SSR'||player.rarity==='A'?'#0a0a10':'#fff')+'">'+player.rarity+'</span>';
  $radarImg.src=player.img;
  $radarModal.classList.add('active');
  document.body.style.overflow='hidden';
}
function closeRadar(){
  $radarModal.classList.remove('active');
  document.body.style.overflow='';
}
$radarModalClose.addEventListener('click',(e)=>{e.stopPropagation();closeRadar();});
$radarModal.addEventListener('click',function(e){if(e.target===$radarModal)closeRadar();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeRadar();});

// ==================== RENDER FLIP CARD ====================
function renderFlipCard(player,delay){
  const rCls=player.rarity.toLowerCase();
  const wrap=document.createElement('div');
  wrap.className='flip-card';
  wrap.style.opacity='0';
  wrap.style.transform='scale(0.7)';
  wrap.style.transition='opacity 0.35s ease-out,transform 0.35s cubic-bezier(0.23,1,0.32,1)';
  wrap.innerHTML=`
    <div class="card-inner">
      <div class="card-face card-back">
        <div class="card-back-pattern"></div>
        <div class="card-back-icon">&#127936;</div>
        <div class="card-back-label">校园2K</div>
      </div>
      <div class="card-face card-front ${rCls}">
        <div class="cf-header">
          <div class="cf-rarity-badge">${player.rarity}</div>
        </div>
        <div class="cf-body">
          <img src="${player.img}" alt="${player.name}" onerror="this.outerHTML='<div style=color:var(--text-muted);font-size:10px;padding:10px>卡面<br>加载中</div>'">
        </div>
        <div class="cf-footer">
          <div class="cf-name">${player.name}</div>
          <div class="cf-pos">${player.pos}</div>
        </div>
        <div class="card-click-hint" data-hint>点击查看卡面</div>
      </div>
    </div>
  `;

  wrap.addEventListener('click',function handler(){
    initAudio();
    if(wrap.classList.contains('flipped')){
      openRadar(player);
      return;
    }
    sfxFlip();
    wrap.classList.add('flipped');
    const hint=wrap.querySelector('[data-hint]');
    if(hint)hint.remove();

    if(player.rarity==='SSR'){
      setTimeout(()=>{sfxSSR();showBurst();},300);
      wrap.classList.add('ssr-flip');
    }else if(player.rarity==='SR'){
      setTimeout(()=>sfxRare(),300);
      wrap.classList.add('sr-flip');
    }
  });

  setTimeout(()=>{wrap.style.opacity='1';wrap.style.transform='scale(1)';},delay||0);
  return wrap;
}

// ==================== DRAW ====================
function doDraw(count){
  if(isDrawing)return;
  initAudio();sfxClick();
  isDrawing=true;
  const players=rollPlayers(count);
  players.forEach(p=>{addToCollection(p);totalDraws++;});
  updateStats();

  $drawArea.innerHTML='';
  players.forEach((p,i)=>{$drawArea.appendChild(renderFlipCard(p,i*120));});

  const rares=players.filter(p=>p.rarity==='SSR'||p.rarity==='SR'||p.rarity==='S');
  if(rares.length>0){
    setTimeout(()=>{
      const names=rares.map(p=>p.rarity+' '+p.name).join('、');
      showToast('\u{1F389} 抽到 '+names+'！',rares[0].rarity);
    },800);
  }
  setTimeout(()=>{isDrawing=false;},players.length*120+800);
}

// ==================== COLLECTION ====================
function addToCollection(player){
  if(!collection[player.name])collection[player.name]={count:0,player};
  collection[player.name].count++;
}
function updateStats(){
  const unique=Object.keys(collection).length;
  $collectionCount.textContent='已收集: '+unique+'/15';
  renderCollection();
}
function renderCollection(){
  $collectionGrid.innerHTML='';
  PLAYERS.forEach(player=>{
    const entry=collection[player.name];
    const owned=!!entry;
    const card=document.createElement('div');
    card.className='collection-card '+player.rarity.toLowerCase();
    if(!owned)card.classList.add('locked');
    card.innerHTML=`
      <div class="cc-rarity" style="background:${RARITY_COLORS[player.rarity].hex};color:${player.rarity==='SSR'||player.rarity==='A'?'#0a0a10':'#fff'}">${player.rarity}</div>
      ${owned
        ?`<img class="cc-img" src="${player.img}" alt="${player.name}" loading="lazy" onerror="this.outerHTML='<div style=color:var(--text-muted);font-size:9px;padding:18px 0>?</div>'">`
        :`<div class="cc-placeholder">?</div>`}
      <div class="cc-name">${player.name}</div>
      <div class="cc-ovr">${player.ovr}</div>
      ${owned?`<div class="cc-count">×${entry.count}</div>`:'<div style="font-size:9px;color:var(--text-muted);margin-top:1px">未获得</div>'}
    `;
    $collectionGrid.appendChild(card);
  });
}

// ==================== BUTTONS ====================
$btnSingle.addEventListener('click',()=>doDraw(1));
$btnFive.addEventListener('click',()=>doDraw(5));
document.addEventListener('keydown',function(e){
  if(e.key==='1'&&!e.ctrlKey&&!e.metaKey)doDraw(1);
  if(e.key==='5'&&!e.ctrlKey&&!e.metaKey)doDraw(5);
});

// ==================== INIT ====================
updateStats();

// ==================== PRELOAD ====================
(function(){
  var all=[];
  PLAYERS.forEach(function(p){all.push(p.img);});
  var total=all.length;
  var loaded=0;
  var $bar=document.getElementById('loadingBar');
  var $count=document.getElementById('loadingCount');
  var $screen=document.getElementById('loadingScreen');
  $bar.style.width='0%';
  $count.textContent='0 / '+total;
  var cacheDiv=document.createElement('div');
  cacheDiv.style.display='none';
  document.body.appendChild(cacheDiv);
  all.forEach(function(src){
    var img=document.createElement('img');
    img.onload=function(){loaded++;updateProgress();};
    img.onerror=function(){loaded++;updateProgress();};
    img.src=src;
    cacheDiv.appendChild(img);
  });
  function updateProgress(){
    $bar.style.width=Math.round(loaded/total*100)+'%';
    $count.textContent=loaded+' / '+total;
    if(loaded>=total)setTimeout(function(){$screen.classList.add('hidden');},400);
  }
})();
</script>
</body>
